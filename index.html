<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing HQ — Task Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
/* ━━━ CSS RESET & VARIABLES ━━━ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F5F7FA; --surface: #FFFFFF; --border: #EAECF0; --border-light: #F4F5F7;
  --text: #1E293B; --text-secondary: #475569; --text-muted: #94A3B8; --text-faint: #B0B8C4;
  --blue: #3B82F6; --indigo: #6366F1; --purple: #8B5CF6; --sky: #0EA5E9;
  --green: #22C55E; --green-dark: #16A34A; --amber: #F59E0B; --red: #EF4444;
  --radius: 14px; --radius-sm: 8px; --radius-xs: 6px;
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.03); --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
  --shadow-lg: 0 20px 50px rgba(0,0,0,0.18);
}
html { font-size: 16px; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
button { font-family: var(--font); cursor: pointer; border: none; background: none; }
select, input, textarea { font-family: var(--font); }
select:focus, input:focus, textarea:focus { border-color: var(--blue) !important; outline: none; }
button:hover { filter: brightness(0.97); }
a { text-decoration: none; }
::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }

/* ━━━ ANIMATIONS ━━━ */
@keyframes slideIn { from { transform: translateX(80px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes fadeUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

/* ━━━ LAYOUT ━━━ */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; position: sticky; top: 0; z-index: 100; }
.topbar-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 54px; }
.main { max-width: 960px; margin: 0 auto; padding: 20px 20px 40px; }

/* ━━━ LOGO ━━━ */
.logo { display: flex; align-items: center; gap: 9px; }
.logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--blue), var(--indigo)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 800; }
.logo-text { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
.logo-sub { font-size: 9px; color: var(--text-muted); letter-spacing: 0.4px; margin-top: -1px; }

/* ━━━ NAV ━━━ */
.nav { display: flex; align-items: center; gap: 4px; }
.nav-btn { padding: 6px 14px; border-radius: 7px; font-size: 11px; font-weight: 600; color: var(--text-muted); transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
.nav-btn.active { background: var(--blue); color: #fff; }
.nav-btn:not(.active):hover { background: rgba(59,130,246,0.06); color: var(--text-secondary); }

/* ━━━ CONTROLS ━━━ */
.controls { display: flex; align-items: center; gap: 7px; }
.sync-badge { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; transition: all 0.3s; }
.sync-badge.connected { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.15); color: var(--green-dark); }
.sync-badge.offline { background: rgba(148,163,184,0.08); border: 1px solid rgba(148,163,184,0.12); color: var(--text-muted); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; }
.sync-badge.connected .sync-dot { background: var(--green); }
.sync-badge.offline .sync-dot { background: #CBD5E1; }
.sync-badge.syncing .sync-dot { animation: pulse 1s infinite; }
.ctrl-select { padding: 5px 8px; border-radius: 7px; border: 1px solid var(--border); font-size: 10px; background: #FAFBFC; }
.btn-settings { width: 32px; height: 32px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 15px; }
.btn-new { padding: 6px 15px; border-radius: 7px; background: linear-gradient(135deg, var(--blue), var(--indigo)); color: #fff; font-size: 11px; font-weight: 600; box-shadow: 0 2px 8px rgba(59,130,246,0.22); display: flex; align-items: center; gap: 4px; }
.btn-new span { font-size: 16px; line-height: 1; }

/* ━━━ STAT CARDS ━━━ */
.stats-row { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
.stat-card { background: var(--surface); border-radius: var(--radius); padding: 15px 16px; border: 1px solid var(--border); flex: 1 1 135px; min-width: 120px; animation: fadeUp 0.4s ease both; }
.stat-card:nth-child(2) { animation-delay: 0.05s; }
.stat-card:nth-child(3) { animation-delay: 0.1s; }
.stat-card:nth-child(4) { animation-delay: 0.15s; }
.stat-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.stat-icon { font-size: 18px; }
.stat-label { font-size: 8px; padding: 2px 7px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
.stat-sub { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

/* ━━━ XP BAR ━━━ */
.xp-bar { padding: 14px 16px; background: rgba(59,130,246,0.03); border-radius: 12px; border: 1px solid rgba(59,130,246,0.07); animation: fadeUp 0.4s ease both; }
.xp-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.xp-user { display: flex; align-items: center; gap: 10px; }
.avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; }
.xp-name { font-size: 13px; font-weight: 600; }
.xp-level { font-size: 10px; color: var(--text-secondary); }
.xp-amount { font-size: 13px; font-weight: 700; color: var(--blue); }
.xp-track { height: 5px; background: #E8ECF0; border-radius: 3px; overflow: hidden; }
.xp-fill { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
.xp-meta { font-size: 9px; color: var(--text-muted); margin-top: 3px; text-align: right; }

/* ━━━ TASK CARDS ━━━ */
.task-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; transition: all 0.2s; box-shadow: var(--shadow-sm); }
.task-card.overdue { border-color: rgba(239,68,68,0.18); box-shadow: 0 0 0 1px rgba(239,68,68,0.06); }
.task-header { padding: 13px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
.task-bar { width: 4px; height: 34px; border-radius: 2px; flex-shrink: 0; }
.task-info { flex: 1; min-width: 0; }
.task-title-row { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
.task-title { font-size: 13px; font-weight: 600; }
.task-title.done { color: var(--text-muted); text-decoration: line-through; }
.task-priority { font-size: 8px; padding: 2px 5px; border-radius: 3px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.task-meta { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--text-muted); }
.task-meta .overdue-text { color: var(--red); font-weight: 600; }
.task-meta .today-text { color: var(--amber); font-weight: 600; }
.task-avatar-sm { width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 7px; font-weight: 700; }
.task-status { padding: 4px 7px; border-radius: 7px; border: 1px solid var(--border); font-size: 10px; font-weight: 600; cursor: pointer; }
.task-expand { font-size: 14px; color: #CBD5E1; transition: transform 0.2s; }
.task-expand.open { transform: rotate(180deg); }
.task-detail { padding: 0 16px 14px 32px; border-top: 1px solid var(--border-light); }
.task-desc { font-size: 12px; color: var(--text-secondary); margin: 10px 0 6px; line-height: 1.6; }
.task-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.task-actions select, .task-actions button { padding: 4px 7px; border-radius: var(--radius-xs); border: 1px solid var(--border); font-size: 10px; background: #FAFBFC; }
.btn-delete { border-color: rgba(239,68,68,0.15) !important; color: var(--red) !important; background: rgba(239,68,68,0.03) !important; }
.notes-section { margin-top: 10px; }
.notes-label { font-size: 10px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; }
.note-item { padding: 6px 9px; background: #F8F9FA; border-radius: 7px; margin-bottom: 3px; font-size: 11px; }
.note-text { color: var(--text); }
.note-meta { color: var(--text-muted); font-size: 9px; margin-top: 2px; }
.note-input-row { display: flex; gap: 5px; margin-top: 5px; }
.note-input { flex: 1; padding: 5px 9px; border-radius: 7px; border: 1px solid var(--border); font-size: 11px; }
.btn-note { padding: 5px 11px; border-radius: 7px; background: var(--blue); color: #fff; font-size: 10px; font-weight: 600; }

/* ━━━ ACTION BUTTONS (Dashboard) ━━━ */
.action-btn { padding: 12px 14px; border-radius: 11px; border: 1px solid var(--border); background: var(--surface); font-size: 12px; font-weight: 600; color: var(--text-secondary); text-align: left; display: flex; align-items: center; gap: 9px; transition: all 0.2s; width: 100%; }
.action-btn:hover { border-color: rgba(59,130,246,0.2); background: rgba(59,130,246,0.02); }
.action-icon { font-size: 16px; }
.action-sub { font-size: 9px; color: var(--text-muted); font-weight: 400; }

/* ━━━ FILTERS ━━━ */
.filters { display: flex; gap: 5px; flex-wrap: wrap; }
.filter-select { padding: 4px 8px; border-radius: 7px; border: 1px solid var(--border); font-size: 10px; background: var(--surface); }

/* ━━━ REPORT ━━━ */
.report-header { background: linear-gradient(135deg, #1E293B, #334155); border-radius: 16px; padding: 26px 28px; color: #fff; margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; }
.report-rate { font-size: 42px; font-weight: 800; }
.report-section { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 18px; margin-bottom: 14px; }
.report-section h3 { margin: 0 0 12px; font-size: 13px; font-weight: 700; }
.cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.cat-icon { font-size: 14px; width: 22px; }
.cat-name { font-size: 11px; font-weight: 600; color: var(--text-secondary); width: 70px; }
.cat-track { flex: 1; height: 7px; background: #F1F5F9; border-radius: 4px; overflow: hidden; }
.cat-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
.cat-count { font-size: 10px; color: var(--text-secondary); font-weight: 600; min-width: 40px; text-align: right; }
.team-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border-light); }
.team-stats { display: flex; gap: 10px; font-size: 10px; }
.team-stat { text-align: center; }
.team-stat-val { font-weight: 700; }
.team-stat-lbl { color: var(--text-muted); }
.recent-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #F8F9FA; font-size: 11px; }
.project-row { padding: 8px 0; border-bottom: 1px solid #F8F9FA; }
.project-title-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.project-bar { width: 3px; height: 14px; border-radius: 2px; }
.project-note { font-size: 9px; color: var(--text-muted); padding: 2px 7px; background: #F8F9FA; border-radius: 4px; margin-top: 2px; margin-left: 9px; }

/* ━━━ BADGES ━━━ */
.badges-grid { display: flex; gap: 8px; flex-wrap: wrap; }
.badge { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 9px; border-radius: 9px; min-width: 74px; transition: all 0.3s; }
.badge.earned { background: rgba(59,130,246,0.05); border: 1px solid rgba(59,130,246,0.1); }
.badge.locked { background: rgba(148,163,184,0.04); border: 1px solid rgba(148,163,184,0.06); opacity: 0.35; }
.badge-icon { font-size: 22px; }
.badge-name { font-size: 9px; font-weight: 600; text-align: center; }
.badge-desc { font-size: 8px; color: var(--text-muted); text-align: center; }

/* ━━━ MODALS ━━━ */
.modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.55); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; animation: fadeUp 0.2s ease; }
.modal { background: var(--surface); border-radius: 16px; width: 100%; box-shadow: var(--shadow-lg); animation: popIn 0.25s ease; }
.modal-header { padding: 18px 22px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); }
.modal-body { padding: 18px 22px; }
.modal-footer { padding: 12px 22px; border-top: 1px solid var(--border-light); display: flex; gap: 8px; justify-content: flex-end; }
.form-group { margin-bottom: 12px; }
.form-row { display: flex; gap: 10px; }
.form-row > div { flex: 1; }
.form-label { font-size: 10px; font-weight: 600; color: var(--text-secondary); margin-bottom: 3px; display: block; }
.form-input { width: 100%; padding: 8px 11px; border-radius: 9px; border: 1px solid var(--border); font-size: 12px; background: #FAFBFC; }
textarea.form-input { resize: vertical; }
.btn-cancel { padding: 8px 16px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface); font-size: 12px; color: var(--text-secondary); }
.btn-create { padding: 8px 22px; border-radius: 9px; background: linear-gradient(135deg, var(--blue), var(--indigo)); color: #fff; font-size: 12px; font-weight: 600; box-shadow: 0 2px 8px rgba(59,130,246,0.25); }
.btn-primary-sm { padding: 7px 14px; border-radius: var(--radius-sm); background: var(--blue); color: #fff; font-size: 11px; font-weight: 600; }
.btn-outline-sm { padding: 7px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); font-size: 11px; font-weight: 600; color: var(--text-secondary); }
.btn-green-sm { padding: 7px 14px; border-radius: var(--radius-sm); background: var(--green); color: #fff; font-size: 11px; font-weight: 600; }
.setting-block { padding: 16px; background: #F8FAFC; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 14px; }
.setting-warn { margin-top: 10px; padding: 12px; background: #FFFBEB; border-radius: var(--radius-sm); border: 1px solid #FDE68A; font-size: 11px; color: #92400E; line-height: 1.6; }

/* ━━━ TOAST ━━━ */
.toast { position: fixed; top: 16px; right: 16px; z-index: 2000; background: var(--text); color: #fff; padding: 11px 18px; border-radius: 11px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 7px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); animation: slideIn 0.3s ease; }
.toast-icon { font-size: 16px; }

/* ━━━ EMPTY STATE ━━━ */
.empty { padding: 28px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); text-align: center; }
.empty-icon { font-size: 28px; margin-bottom: 6px; }
.empty-text { font-size: 12px; color: var(--text-secondary); }

/* ━━━ RESPONSIVE ━━━ */
@media (max-width: 768px) {
  .topbar-inner { flex-wrap: wrap; height: auto; padding: 10px 0; gap: 8px; }
  .nav { order: 3; width: 100%; justify-content: center; }
  .controls { flex-wrap: wrap; }
  .form-row { flex-direction: column; }
  .report-header { flex-direction: column; gap: 12px; text-align: center; }
}

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ━━━ TOP BAR ━━━ -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">
      <div class="logo-icon">M</div>
      <div>
        <div class="logo-text">Marketing HQ</div>
        <div class="logo-sub">Task Tracker</div>
      </div>
    </div>
    <div class="nav" id="nav"></div>
    <div class="controls">
      <div class="sync-badge offline" id="syncBadge">
        <div class="sync-dot"></div>
        <span id="syncText">Offline Mode</span>
      </div>

      <button class="btn-settings" id="btnSettings" title="Settings">⚙</button>
      <button class="btn-new" id="btnNew"><span>+</span> New</button>
    </div>
  </div>
</div>

<!-- ━━━ MAIN ━━━ -->
<div class="main" id="app"></div>

<!-- ━━━ TOAST ━━━ -->
<div class="toast hidden" id="toast"><span class="toast-icon" id="toastIcon"></span><span id="toastMsg"></span></div>

<script>
// ╔══════════════════════════════════════════════════════════════════╗

// ━━━ STATE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let state = { tasks: [], xp: {}, view: "dashboard", user: "marcus", filters: { cat:"all", status:"all", who:"all" } };
let sheetsConnected = false, syncing = false;

// ━━━ HELPERS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const $ = id => document.getElementById(id);
const genId = () => Date.now().toString(36) + Math.random().toString(36).substr(2,5);
const fmtDate = d => new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
const isToday = d => new Date().toDateString() === new Date(d).toDateString();
function daysUntil(d) { const n=new Date(); n.setHours(0,0,0,0); const t=new Date(d); t.setHours(0,0,0,0); return Math.ceil((t-n)/864e5); }
function getLevel(xp) { let l=0; for(let i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i]){l=i;break;}} const nx=LEVELS[l+1]||LEVELS[l]+1000; return {level:l,name:LEVEL_NAMES[l],progress:Math.min(((xp-LEVELS[l])/(nx-LEVELS[l]))*100,100),nextXp:nx}; }
function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

function toast(msg, icon="✅") {
  const t=$("toast"); $("toastIcon").textContent=icon; $("toastMsg").textContent=msg;
  t.classList.remove("hidden");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.classList.add("hidden"), 2800);
}

function updateSync(connected, isSyncing) {
  sheetsConnected=connected; syncing=isSyncing;
  const b=$("syncBadge"), t=$("syncText");
  b.className = "sync-badge " + (isSyncing?"syncing ":"") + (connected?"connected":"offline");
  t.textContent = isSyncing ? "Syncing..." : connected ? "Sheets Connected" : "Offline Mode";
}

function save() {
  try { localStorage.setItem("mhq-data", JSON.stringify({tasks:state.tasks,xp:state.xp})); } catch(e){}
}

// ━━━ SHEETS API ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Sheets = {
  ok: () => !!APPS_SCRIPT_URL,
  async get() {
    if(!this.ok()) return null;
    try {
      const r = await fetch(APPS_SCRIPT_URL+"?action=getTasks");
      const d = await r.json();
      if(d.success) return d.tasks.map(t=>({...t, status:STATUS_REV[t.status]||t.status, assignee:ID_MAP[t.assignee]||t.assignee, category:(t.category||"daily").toLowerCase(), priority:(t.priority||"medium").toLowerCase()}));
    } catch(e){ console.error("Fetch:",e); }
    return null;
  },
  async post(action, data) {
    if(!this.ok()) return;
    try { await fetch(APPS_SCRIPT_URL, { method:"POST", headers:{"Content-Type":"text/plain"}, body:JSON.stringify({action,...data}) }); } catch(e){ console.error("Post:",e); }
  },
  mapOut(t) { return {...t, status:STATUS_MAP[t.status]||t.status, assignee:NAME_MAP[t.assignee]||t.assignee}; }
};

// ━━━ TASK CRUD ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function addTask(form) {
  const task = { ...form, id:genId(), status:"todo", notes:[], createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() };
  state.tasks.push(task); save(); render();
  toast("Task created! +" + XP_VAL[form.category] + " XP on completion","✨");
  await Sheets.post("addTask", { task: Sheets.mapOut(task) });
}

async function updateTask(id, updates) {
  const t = state.tasks.find(x=>x.id===id);
  if(!t) return;
  const wasDone = t.status === "done";
  Object.assign(t, updates, { updatedAt: new Date().toISOString() });
  if(updates.status==="done" && !wasDone) {
    state.xp[t.assignee] = (state.xp[t.assignee]||0) + XP_VAL[t.category];
    toast("Done! +" + XP_VAL[t.category] + " XP earned!","🎉");
  }
  save(); render();
  const mapped = {...updates};
  if(mapped.status) mapped.status = STATUS_MAP[mapped.status]||mapped.status;
  if(mapped.assignee) mapped.assignee = NAME_MAP[mapped.assignee]||mapped.assignee;
  await Sheets.post("updateTask", { id, updates: mapped });
}

async function deleteTask(id) {
  state.tasks = state.tasks.filter(t=>t.id!==id);
  save(); render(); toast("Deleted","🗑️");
  await Sheets.post("deleteTask", { id });
}

async function addNote(taskId, text) {
  const t = state.tasks.find(x=>x.id===taskId);
  if(!t) return;
  if(!t.notes) t.notes=[];
  t.notes.push({ id:genId(), text, user:state.user, date:new Date().toISOString() });
  save(); render();
  await Sheets.post("addNote", { id:taskId, note:text, user:NAME_MAP[state.user]||state.user });
}

async function syncAll() {
  updateSync(sheetsConnected, true);
  const mapped = state.tasks.map(Sheets.mapOut);
  await Sheets.post("syncAll", { tasks: mapped });
  updateSync(true, false);
  toast("Synced to Google Sheets!","📊");
}

// ━━━ RENDER ENGINE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function render() {
  renderNav();
  const app = $("app");
  switch(state.view) {
    case "dashboard": app.innerHTML = renderDashboard(); break;
    case "tasks": app.innerHTML = renderTasks(); break;
    case "report": app.innerHTML = renderReport(); break;
    case "achievements": app.innerHTML = renderAchievements(); break;
  }
  bindEvents();
}

function renderNav() {
  const navs = [{id:"dashboard",label:"Dashboard",icon:"◻"},{id:"tasks",label:"Tasks",icon:"☰"},{id:"report",label:"Report",icon:"◈"},{id:"achievements",label:"Rewards",icon:"★"}];
  $("nav").innerHTML = navs.map(n=>`<button class="nav-btn${state.view===n.id?" active":""}" data-view="${n.id}">${n.icon} ${n.label}</button>`).join("");
  $("userSelect").innerHTML = TEAM.map(u=>`<option value="${u.id}"${state.user===u.id?" selected":""}>${u.avatar}</option>`).join("");
}

function renderStatCard(label, value, icon, color="#3B82F6", sub="") {
  return `<div class="stat-card"><div class="stat-top"><span class="stat-icon">${icon}</span><span class="stat-label" style="background:${color}0D;color:${color}">${label}</span></div><div class="stat-value">${value}</div>${sub?`<div class="stat-sub">${sub}</div>`:""}</div>`;
}

function renderXPBar(user, xp) {
  const l = getLevel(xp);
  return `<div class="xp-bar"><div class="xp-top"><div class="xp-user"><div class="avatar" style="background:linear-gradient(135deg,${user.color},${user.color}80)">${user.avatar}</div><div><div class="xp-name">${user.name}</div><div class="xp-level">${l.name} · Lvl ${l.level+1}</div></div></div><div class="xp-amount">${xp} XP</div></div><div class="xp-track"><div class="xp-fill" style="width:${l.progress}%;background:linear-gradient(90deg,${user.color},var(--blue))"></div></div><div class="xp-meta">${xp}/${l.nextXp} XP</div></div>`;
}

function renderTaskCard(t) {
  const who = TEAM.find(u=>u.id===t.assignee)||TEAM[0];
  const d = daysUntil(t.dueDate);
  const over = d<0 && t.status!=="done";
  const today = d===0 && t.status!=="done";
  const cat = CATEGORIES[t.category]||CATEGORIES.daily;
  const pri = PRIORITY[t.priority]||PRIORITY.medium;
  const st = STATUS[t.status]||STATUS.todo;
  const dueText = over ? `<span class="overdue-text">${Math.abs(d)}d overdue</span>` : today ? `<span class="today-text">Due today</span>` : d===1 ? "Tomorrow" : `${d}d`;

  const statusOpts = Object.entries(STATUS).map(([k,v])=>`<option value="${k}"${t.status===k?" selected":""}>${v.label}</option>`).join("");
  const assignOpts = TEAM.map(u=>`<option value="${u.id}"${t.assignee===u.id?" selected":""}>${u.name}</option>`).join("");
  const priOpts = Object.entries(PRIORITY).map(([k,v])=>`<option value="${k}"${t.priority===k?" selected":""}>${v.icon} ${v.label}</option>`).join("");
  const notes = (t.notes||[]).map(n=>`<div class="note-item"><div class="note-text">${esc(n.text)}</div><div class="note-meta">${(TEAM.find(u=>u.id===n.user)||{name:"Unknown"}).name} · ${fmtDate(n.date)}</div></div>`).join("");

  return `<div class="task-card${over?" overdue":""}"><div class="task-header" data-toggle="${t.id}"><div class="task-bar" style="background:${cat.color}"></div><div class="task-info"><div class="task-title-row"><span class="task-title${t.status==="done"?" done":""}">${esc(t.title)}</span><span class="task-priority" style="background:${pri.color}12;color:${pri.color}">${t.priority}</span></div><div class="task-meta">${cat.icon} ${cat.label} · ${dueText} · <div class="task-avatar-sm" style="background:${who.color}">${who.avatar}</div></div></div><select class="task-status" data-status="${t.id}" style="color:${st.color};background:${st.color}06" onclick="event.stopPropagation()">${statusOpts}</select><span class="task-expand" data-expand="${t.id}">▾</span></div><div class="task-detail hidden" id="detail-${t.id}">${t.description?`<p class="task-desc">${esc(t.description)}</p>`:""}<div class="task-actions"><select data-assign="${t.id}">${assignOpts}</select><select data-pri="${t.id}">${priOpts}</select><button class="btn-delete" data-del="${t.id}">Delete</button></div><div class="notes-section"><div class="notes-label">Notes</div>${notes}<div class="note-input-row"><input class="note-input" placeholder="Add note..." data-notein="${t.id}"><button class="btn-note" data-noteadd="${t.id}">Add</button></div></div></div></div>`;
}

// ━━━ DASHBOARD ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderDashboard() {
  const tasks = state.tasks;
  const total = tasks.length, done = tasks.filter(t=>t.status==="done").length;
  const overdue = tasks.filter(t=>t.status!=="done"&&daysUntil(t.dueDate)<0).length;
  const todayCount = tasks.filter(t=>t.status!=="done"&&daysUntil(t.dueDate)===0).length;
  const rate = total>0?Math.round((done/total)*100):0;
  const hr = new Date().getHours();
  const greet = hr<12?"Good morning":hr<17?"Good afternoon":"Evening";
  const user = TEAM.find(u=>u.id===state.user);

  const todayTasks = tasks.filter(t=>t.status!=="done"&&daysUntil(t.dueDate)<=1).sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));

  return `
    <div style="margin-bottom:18px;animation:fadeUp 0.3s ease"><h1 style="font-size:20px;font-weight:800;letter-spacing:-0.5px;margin-bottom:3px">${greet}, ${user.name.split(" ")[0]} 👋</h1><p style="font-size:12px;color:var(--text-muted)">${fmtDate(new Date())} · ${todayCount} due today${overdue>0?` · ${overdue} overdue`:" · All on track"}</p></div>
    <div class="stats-row">${renderStatCard("Total",total,"📋","#3B82F6","All tasks")}${renderStatCard("Done",done,"✅","#22C55E",rate+"%")}${renderStatCard("Today",todayCount,"📌","#F59E0B")}${renderStatCard("Overdue",overdue,"⏰","#EF4444")}</div>
    <div style="display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap">
      <div style="flex:1 1 300px;display:flex;flex-direction:column;gap:8px">${TEAM.map(u=>renderXPBar(u, state.xp[u.id]||0)).join("")}</div>
      <div style="flex:1 1 220px;display:flex;flex-direction:column;gap:7px">
        <button class="action-btn" onclick="window.open('${SHEET_URL}','_blank')"><span class="action-icon">📊</span><div><div>Google Sheets</div><div class="action-sub">${sheetsConnected?"Connected & syncing":"Open linked spreadsheet"}</div></div></button>
        <button class="action-btn" data-action="email"><span class="action-icon">📧</span><div><div>Send Daily Email</div><div class="action-sub">Trigger summary email now</div></div></button>
        <button class="action-btn" data-action="sync"><span class="action-icon">🔄</span><div><div>Sync to Sheets</div><div class="action-sub">Push all tasks to spreadsheet</div></div></button>
        <button class="action-btn" data-action="report"><span class="action-icon">📑</span><div><div>MD Report</div><div class="action-sub">View performance report</div></div></button>
      </div>
    </div>
    <h2 style="font-size:14px;font-weight:700;margin-bottom:10px">Today's Focus</h2>
    ${todayTasks.length===0?`<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">No tasks due today. Click + New to add some.</div></div>`:todayTasks.map(renderTaskCard).join("")}
  `;
}

// ━━━ TASKS VIEW ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderTasks() {
  const f = state.filters;
  let tasks = state.tasks.filter(t=>{
    if(f.cat!=="all"&&t.category!==f.cat)return false;
    if(f.status!=="all"&&t.status!==f.status)return false;
    if(f.who!=="all"&&t.assignee!==f.who)return false;
    return true;
  }).sort((a,b)=>{ if(a.status==="done"&&b.status!=="done")return 1; if(a.status!=="done"&&b.status==="done")return -1; return new Date(a.dueDate)-new Date(b.dueDate); });

  const catOpts = Object.entries(CATEGORIES).map(([k,v])=>`<option value="${k}"${f.cat===k?" selected":""}>${v.icon} ${v.label}</option>`).join("");
  const stOpts = Object.entries(STATUS).map(([k,v])=>`<option value="${k}"${f.status===k?" selected":""}>${v.label}</option>`).join("");
  const whoOpts = TEAM.map(u=>`<option value="${u.id}"${f.who===u.id?" selected":""}>${u.name}</option>`).join("");

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><h2 style="font-size:17px;font-weight:700">All Tasks</h2><div class="filters"><select class="filter-select" id="fCat"><option value="all">All Categories</option>${catOpts}</select><select class="filter-select" id="fStat"><option value="all">All Statuses</option>${stOpts}</select><select class="filter-select" id="fWho"><option value="all">All Team</option>${whoOpts}</select></div></div>
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px">${tasks.length} task${tasks.length!==1?"s":""}</div>
    ${tasks.length===0?`<div class="empty"><div class="empty-icon" style="font-size:36px;margin-bottom:10px">📭</div><div style="font-size:13px;font-weight:600;color:var(--text-secondary)">No tasks found</div></div>`:tasks.map(renderTaskCard).join("")}
  `;
}

// ━━━ REPORT VIEW ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderReport() {
  const tasks=state.tasks, total=tasks.length, done=tasks.filter(t=>t.status==="done").length;
  const ip=tasks.filter(t=>t.status==="in_progress").length, over=tasks.filter(t=>t.status!=="done"&&daysUntil(t.dueDate)<0).length;
  const rate=total>0?Math.round((done/total)*100):0;
  const byCat=Object.keys(CATEGORIES).map(c=>({c,total:tasks.filter(t=>t.category===c).length,done:tasks.filter(t=>t.category===c&&t.status==="done").length}));
  const byUser=TEAM.map(u=>({...u,total:tasks.filter(t=>t.assignee===u.id).length,done:tasks.filter(t=>t.assignee===u.id&&t.status==="done").length,ip:tasks.filter(t=>t.assignee===u.id&&t.status==="in_progress").length,over:tasks.filter(t=>t.assignee===u.id&&t.status!=="done"&&daysUntil(t.dueDate)<0).length}));
  const recent=tasks.filter(t=>t.status==="done").sort((a,b)=>new Date(b.updatedAt||b.createdAt)-new Date(a.updatedAt||a.createdAt)).slice(0,8);
  const active=tasks.filter(t=>t.status!=="done").sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate)).slice(0,10);

  return `
    <div class="report-header"><div><div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;opacity:0.4;margin-bottom:3px">Marketing Department</div><h2 style="font-size:20px;font-weight:700;margin:0">Performance Report</h2><p style="margin:3px 0 0;font-size:11px;opacity:0.5">${fmtDate(new Date())} · MD Review</p></div><div style="text-align:right"><div class="report-rate">${rate}%</div><div style="font-size:10px;opacity:0.5">Completion</div></div></div>
    <div class="stats-row">${renderStatCard("Total",total,"📋")}${renderStatCard("Done",done,"✅","#22C55E",rate+"%")}${renderStatCard("Active",ip,"⚡","#F59E0B")}${renderStatCard("Overdue",over,"⏰","#EF4444")}</div>
    <div class="report-section"><h3>Category Breakdown</h3>${byCat.map(c=>`<div class="cat-row"><span class="cat-icon">${CATEGORIES[c.c].icon}</span><span class="cat-name">${CATEGORIES[c.c].label}</span><div class="cat-track"><div class="cat-fill" style="width:${c.total>0?(c.done/c.total)*100:0}%;background:${CATEGORIES[c.c].color}"></div></div><span class="cat-count">${c.done}/${c.total}</span></div>`).join("")}</div>
    <div class="report-section"><h3>Team Performance</h3>${byUser.map(u=>`<div class="team-row"><div class="avatar" style="background:linear-gradient(135deg,${u.color},${u.color}80)">${u.avatar}</div><div style="flex:1"><div style="font-size:12px;font-weight:600">${u.name}</div><div style="font-size:10px;color:var(--text-muted)">${u.role} · ${state.xp[u.id]||0} XP</div></div><div class="team-stats"><div class="team-stat"><div class="team-stat-val" style="color:var(--green)">${u.done}</div><div class="team-stat-lbl">Done</div></div><div class="team-stat"><div class="team-stat-val" style="color:var(--blue)">${u.ip}</div><div class="team-stat-lbl">Active</div></div><div class="team-stat"><div class="team-stat-val" style="color:var(--red)">${u.over}</div><div class="team-stat-lbl">Late</div></div></div></div>`).join("")}</div>
    ${recent.length?`<div class="report-section"><h3>✅ Recently Completed</h3>${recent.map(t=>`<div class="recent-row"><span style="color:var(--green);font-weight:700">✓</span><span style="flex:1;color:var(--text-secondary)">${esc(t.title)}</span><span style="color:var(--text-muted);font-size:10px">${(TEAM.find(u=>u.id===t.assignee)||{}).name||""}</span></div>`).join("")}</div>`:""}
    ${active.length?`<div class="report-section"><h3>📌 Active Projects & Notes</h3>${active.map(t=>{const st=STATUS[t.status]||STATUS.todo;const cat=CATEGORIES[t.category]||CATEGORIES.daily;const notes=(t.notes||[]).slice(-2).map(n=>`<div class="project-note">💬 ${esc(n.text)} — ${(TEAM.find(u=>u.id===n.user)||{name:""}).name}</div>`).join("");return `<div class="project-row"><div class="project-title-row"><div class="project-bar" style="background:${cat.color}"></div><span style="font-size:12px;font-weight:600">${esc(t.title)}</span><span style="font-size:8px;padding:1px 5px;border-radius:3px;background:${st.color}10;color:${st.color};font-weight:600">${st.label}</span><span style="margin-left:auto;font-size:9px;color:${daysUntil(t.dueDate)<0?"var(--red)":"var(--text-muted)"}">Due ${fmtDate(t.dueDate)}</span></div>${notes}</div>`;}).join("")}</div>`:""}
  `;
}

// ━━━ ACHIEVEMENTS VIEW ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderAchievements() {
  const tasks=state.tasks, done=tasks.filter(t=>t.status==="done").length;
  const stats = { created:tasks.length, done, streak:3, allDaily:tasks.filter(t=>t.category==="daily").every(t=>t.status==="done")&&tasks.some(t=>t.category==="daily"), sameDay:tasks.filter(t=>t.status==="done"&&t.createdAt&&isToday(t.createdAt)).length };

  return `
    <h2 style="font-size:17px;font-weight:700;margin-bottom:3px">Achievements 🏆</h2>
    <p style="font-size:11px;color:var(--text-muted);margin-bottom:16px">Complete tasks to earn XP and unlock badges</p>
    ${TEAM.map(u=>`<div style="margin-bottom:14px">${renderXPBar(u,state.xp[u.id]||0)}</div>`).join("")}
    <div class="report-section" style="margin-top:10px"><h3>Badges</h3><div class="badges-grid">${ACHIEVEMENTS.map(a=>{const earned=a.check(stats);return `<div class="badge ${earned?"earned":"locked"}"><span class="badge-icon">${a.icon}</span><span class="badge-name" style="color:${earned?"var(--text)":"var(--text-muted)"}">${a.name}</span><span class="badge-desc">${a.desc}</span></div>`;}).join("")}</div></div>
    <div class="report-section" style="margin-top:12px"><h3>XP per Task Type</h3><div style="display:flex;gap:10px;flex-wrap:wrap">${Object.entries(CATEGORIES).map(([k,v])=>`<div style="padding:8px 14px;border-radius:9px;background:${v.color}06;border:1px solid ${v.color}12;display:flex;align-items:center;gap:7px"><span style="font-size:16px">${v.icon}</span><div><div style="font-size:11px;font-weight:600">${v.label}</div><div style="font-size:10px;color:${v.color};font-weight:700">+${XP_VAL[k]} XP</div></div></div>`).join("")}</div></div>
  `;
}

// ━━━ EVENT BINDING ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function bindEvents() {
  // Nav
  document.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>{state.view=b.dataset.view;render();});
  // Task toggles
  document.querySelectorAll("[data-toggle]").forEach(el=>el.onclick=()=>{
    const d=document.getElementById("detail-"+el.dataset.toggle);
    const e=el.querySelector(".task-expand");
    if(d){d.classList.toggle("hidden"); if(e) e.classList.toggle("open");}
  });
  // Status changes
  document.querySelectorAll("[data-status]").forEach(s=>s.onchange=()=>updateTask(s.dataset.status,{status:s.value}));
  // Assignee changes
  document.querySelectorAll("[data-assign]").forEach(s=>s.onchange=()=>updateTask(s.dataset.assign,{assignee:s.value}));
  // Priority changes
  document.querySelectorAll("[data-pri]").forEach(s=>s.onchange=()=>updateTask(s.dataset.pri,{priority:s.value}));
  // Delete
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>deleteTask(b.dataset.del));
  // Notes
  document.querySelectorAll("[data-noteadd]").forEach(b=>b.onclick=()=>{
    const inp=document.querySelector(`[data-notein="${b.dataset.noteadd}"]`);
    if(inp&&inp.value.trim()){addNote(b.dataset.noteadd,inp.value);inp.value="";}
  });
  document.querySelectorAll("[data-notein]").forEach(inp=>inp.onkeydown=e=>{
    if(e.key==="Enter"&&inp.value.trim()){addNote(inp.dataset.notein,inp.value);inp.value="";}
  });
  // Filters
  const fC=$("fCat"),fS=$("fStat"),fW=$("fWho");
  if(fC) fC.onchange=()=>{state.filters.cat=fC.value;render();};
  if(fS) fS.onchange=()=>{state.filters.status=fS.value;render();};
  if(fW) fW.onchange=()=>{state.filters.who=fW.value;render();};
  // Action buttons
  document.querySelectorAll("[data-action]").forEach(b=>{
    b.onclick=async()=>{
      switch(b.dataset.action){
        case "email": if(Sheets.ok()){const r=await fetch(APPS_SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"sendDailyEmail"})}).then(r=>r.json()).catch(()=>({success:false}));toast(r.success?"Email sent!":"Deploy Apps Script first",r.success?"📧":"⚠️");}else{toast("Deploy Apps Script first — see Settings","⚠️");}break;
        case "sync": await syncAll(); break;
        case "report": state.view="report"; render(); break;
      }
    };
  });
}

// ━━━ MODALS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showNewTaskModal() {
  const existing = document.getElementById("modalOverlay");
  if(existing) existing.remove();
  const overlay = document.createElement("div");
  overlay.id="modalOverlay"; overlay.className="modal-overlay";
  const catOpts = Object.entries(CATEGORIES).map(([k,v])=>`<option value="${k}">${v.icon} ${v.label}</option>`).join("");
  const priOpts = Object.entries(PRIORITY).map(([k,v])=>`<option value="${k}">${v.icon} ${v.label}</option>`).join("");
  const whoOpts = TEAM.map(u=>`<option value="${u.id}">${u.name}</option>`).join("");
  overlay.innerHTML = `<div class="modal" style="max-width:460px"><div class="modal-header"><div class="modal-title">✨ New Task</div><button class="modal-close" id="closeModal">✕</button></div><div class="modal-body"><div class="form-group"><label class="form-label">Title *</label><input class="form-input" id="mTitle" placeholder="e.g. Update social calendar" autofocus></div><div class="form-group"><label class="form-label">Description</label><textarea class="form-input" id="mDesc" placeholder="Details..." rows="2"></textarea></div><div class="form-row"><div><label class="form-label">Category</label><select class="form-input" id="mCat">${catOpts}</select></div><div><label class="form-label">Priority</label><select class="form-input" id="mPri">${priOpts}</select></div></div><div class="form-row" style="margin-top:12px"><div><label class="form-label">Assign To</label><select class="form-input" id="mWho">${whoOpts}</select></div><div><label class="form-label">Due Date</label><input type="date" class="form-input" id="mDue" value="${new Date().toISOString().slice(0,10)}"></div></div></div><div class="modal-footer"><button class="btn-cancel" id="cancelModal">Cancel</button><button class="btn-create" id="createTask">Create Task</button></div></div>`;
  document.body.appendChild(overlay);
  $("closeModal").onclick=$("cancelModal").onclick=()=>overlay.remove();
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  $("createTask").onclick=()=>{
    const title=$("mTitle").value.trim();
    if(!title) return $("mTitle").style.borderColor="var(--red)";
    addTask({title,description:$("mDesc").value,category:$("mCat").value,priority:$("mPri").value,assignee:$("mWho").value,dueDate:$("mDue").value});
    overlay.remove();
  };
  $("mTitle").onkeydown=e=>{if(e.key==="Enter"){$("createTask").click();}};
}

function showSettingsModal() {
  const existing = document.getElementById("modalOverlay");
  if(existing) existing.remove();
  const overlay = document.createElement("div");
  overlay.id="modalOverlay"; overlay.className="modal-overlay";
  const configured = Sheets.ok();
  overlay.innerHTML = `<div class="modal" style="max-width:520px;max-height:85vh;overflow:auto"><div class="modal-header"><div class="modal-title">⚙️ Settings & Integrations</div><button class="modal-close" id="closeSettings">✕</button></div><div class="modal-body">
    <div class="setting-block"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:20px">📊</span><div><div style="font-size:13px;font-weight:600">Google Sheets</div><div style="font-size:10px;color:${configured?"var(--green-dark)":"var(--amber)"};font-weight:600">${configured?"Connected":"Not configured"}</div></div></div><a href="${SHEET_URL}" target="_blank" class="btn-green-sm" style="display:inline-block;text-decoration:none;margin-right:6px">Open Sheet ↗</a><button class="btn-outline-sm" id="settingsSync">Sync Now</button>${!configured?`<div class="setting-warn"><strong>Setup required:</strong> Deploy the Apps Script as a Web App and paste the URL into the APPS_SCRIPT_URL constant at the top of this HTML file. See the .gs file for instructions.</div>`:""}</div>
    <div class="setting-block"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:20px">📧</span><div><div style="font-size:13px;font-weight:600">Daily Email Summary</div><div style="font-size:10px;color:var(--text-secondary)">Automated at 8:30 AM weekdays</div></div></div><div style="font-size:11px;color:var(--text-secondary);line-height:1.6">Recipients: marcus.knapp@yourcompany.com, anik.choudhury@yourcompany.com<br><em style="color:var(--text-muted)">Update addresses in the Apps Script CONFIG</em></div>${configured?`<button class="btn-primary-sm" id="settingsEmail" style="margin-top:8px">Send Test Email</button>`:""}</div>
    <div class="setting-block"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:20px">💾</span><div style="font-size:13px;font-weight:600">Manual CSV Export</div></div><button class="btn-outline-sm" id="settingsCSV" style="background:#475569;color:#fff;border:none">⬇ Download CSV</button></div>
  </div></div>`;
  document.body.appendChild(overlay);
  $("closeSettings").onclick=()=>overlay.remove();
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  const syncBtn=$("settingsSync"); if(syncBtn) syncBtn.onclick=async()=>{overlay.remove();await syncAll();};
  const emailBtn=$("settingsEmail"); if(emailBtn) emailBtn.onclick=async()=>{if(Sheets.ok()){const r=await fetch(APPS_SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"sendDailyEmail"})}).then(r=>r.json()).catch(()=>({success:false}));toast(r.success?"Email sent!":"Failed",r.success?"📧":"⚠️");}};
  $("settingsCSV").onclick=()=>{
    const h=["ID","Title","Description","Category","Priority","Status","Assignee","Due Date","Created","Notes"];
    const rows=state.tasks.map(t=>[t.id,`"${(t.title||"").replace(/"/g,'""')}"`,`"${(t.description||"").replace(/"/g,'""')}"`,t.category,t.priority,STATUS[t.status]?.label,TEAM.find(u=>u.id===t.assignee)?.name,t.dueDate,t.createdAt,`"${(t.notes||[]).map(n=>n.text).join(" | ").replace(/"/g,'""')}"`]);
    const csv=[h.join(","),...rows.map(r=>r.join(","))].join("\n");
    const b=new Blob([csv],{type:"text/csv"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`tasks-${new Date().toISOString().slice(0,10)}.csv`;a.click();
    toast("CSV downloaded!","💾");
  };
}

// ━━━ INIT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
$("btnNew").onclick = showNewTaskModal;
$("btnSettings").onclick = showSettingsModal;
$("userSelect").onchange = function(){ state.user=this.value; render(); };

(async function init() {
  // Load from localStorage first (instant)
  try {
    const saved = localStorage.getItem("mhq-data");
    if(saved) { const d=JSON.parse(saved); state.tasks=d.tasks||[]; state.xp=d.xp||{}; }
  } catch(e){}

  render();

  // Then try Sheets
  if(Sheets.ok()) {
    updateSync(false, true);
    const tasks = await Sheets.get();
    if(tasks) {
      state.tasks = tasks;
      const xp = {};
      tasks.filter(t=>t.status==="done").forEach(t=>{ xp[t.assignee]=(xp[t.assignee]||0)+(XP_VAL[t.category]||10); });
      state.xp = xp;
      save();
      updateSync(true, false);
      render();
    } else {
      updateSync(false, false);
    }
  }
})();
</script>
</body>
</html>
